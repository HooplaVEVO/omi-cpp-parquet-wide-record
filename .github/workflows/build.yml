name: C++ Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          libpcap0.8-dev \
          wget \
          lsb-release \
          apt-transport-https \
          gnupg

        # Install Arrow/Parquet
        wget https://apache.jfrog.io/artifactory/arrow/$(lsb_release --id --short | tr 'A-Z' 'a-z')/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb
        sudo apt-get install -y ./apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb
        sudo apt-get update
        sudo apt-get install -y libarrow-dev libparquet-dev

        # Check PCAP files
        ls /usr/include/pcap.h
        ls /usr/lib/x86_64-linux-gnu/libpcap*

        # Check Arrow/Parquet files
        ls /usr/include/arrow
        ls /usr/lib/x86_64-linux-gnu/libarrow*
        ls /usr/lib/x86_64-linux-gnu/libparquet*

    - name: Configure and Build
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        cmake --build .