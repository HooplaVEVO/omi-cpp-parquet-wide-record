name: C++ Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          libpcap0.8-dev \
          wget \
          lsb-release \
          apt-transport-https \
          gnupg

    - name: Install Arrow/Parquet from source
      run: |
        # Get current release
        wget https://github.com/apache/arrow/archive/refs/tags/apache-arrow-11.0.0.tar.gz
        tar -xzf apache-arrow-11.0.0.tar.gz
        cd arrow-apache-arrow-11.0.0/cpp
    
        # Create build directory
        mkdir build
        cd build
    
        # Configure Arrow build (minimal components needed)
        cmake .. -DARROW_PARQUET=ON -DARROW_WITH_SNAPPY=ON -DARROW_WITH_ZLIB=ON -DARROW_BUILD_STATIC=OFF
    
        # Build and install
        make -j$(nproc)
        sudo make install
    
        # Return to original directory
        cd ../..

    - name: Install libpcap from source
      run: |
        #Get current release
        wget https://www.tcpdump.org/release/libpcap-1.10.5.tar.xz
        tar -xf libpcap-4.99.5.tar.xz
        cd libpcap/
        
        #Install libpcap
        ./configure
        make
        sudo make install
        
        # Update shared library cache
        sudo ldconfig
        
        #Return to previous directory
        cd ..


    - name: Configure and Build
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        cmake --build .