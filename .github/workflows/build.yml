name: Build with Custom PCAP Config

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          libpcap-dev \
          wget \
          lsb-release

        # Install Arrow/Parquet
        wget https://apache.jfrog.io/artifactory/arrow/$(lsb_release --id --short | tr 'A-Z' 'a-z')/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb
        sudo apt-get install -y ./apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb
        sudo apt-get update
        sudo apt-get install -y libarrow-dev libparquet-dev

    - name: Create fake PcapConfig.cmake
      run: |
        # Create a directory for our fake config
        mkdir -p /tmp/pcap-cmake
        # Generate a minimal PcapConfig.cmake
        cat <<EOF > /tmp/pcap-cmake/PcapConfig.cmake
        set(PCAP_INCLUDE_DIRS "/usr/include/pcap")
        set(PCAP_LIBRARIES "/usr/lib/x86_64-linux-gnu/libpcap.so")
        set(PCAP_FOUND TRUE)
        EOF

    - name: Build
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH=/tmp/pcap-cmake  # Point CMake to our fake config
        cmake --build . --config Release